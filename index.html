<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Coding Exam</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
}

.header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: #020617;
}

.timer {
    color: #f87171;
    font-size: 18px;
}

.container {
    display: flex;
    height: 90vh;
}

.left {
    width: 40%;
    padding: 20px;
    background: #020617;
    overflow-y: auto;
}

.right {
    width: 60%;
    padding: 20px;
}

.editor {
    width: 100%;
    height: 80%;
    background: #020617;
    color: #22c55e;
    border: 1px solid #334155;
    padding: 10px;
    font-family: monospace;
    font-size: 14px;
    outline: none;
    resize: none;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #22c55e;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
    <h2>Coding Exam</h2>
    <div class="timer" id="timer">Time Left: 300</div>
</div>

<div class="container">

    <!-- QUESTION -->
    <div class="left">
        <h3>Question</h3>
        <p>Write a C++ program to check if a number is prime.</p>
    </div>

    <!-- CODE EDITOR -->
    <div class="right">
        <h3>Code Editor (C++)</h3>
        <textarea id="editor" class="editor" spellcheck="false"></textarea>
        <br>
        <button onclick="submitExam()">Submit Code</button>
    </div>

</div>

<script>

// ================= TIMER =================
let timeLeft = 300;

const timer = setInterval(() => {
    document.getElementById("timer").innerText = "Time Left: " + timeLeft;
    timeLeft--;

    if (timeLeft < 0) {
        clearInterval(timer);
        alert("Time Over! Auto submitting...");
        submitExam();
    }
}, 1000);


// ================= SECURITY SYSTEM =================
const editor = document.getElementById("editor");

// Track internal copy
let internalClipboard = "";

// Allow copy ONLY from editor
editor.addEventListener("copy", function(e) {
    internalClipboard = window.getSelection().toString();
});

// Allow cut ONLY from editor
editor.addEventListener("cut", function(e) {
    internalClipboard = window.getSelection().toString();
});

// Custom paste logic
editor.addEventListener("paste", function(e) {
    const pasted = (e.clipboardData || window.clipboardData).getData("text");

    // Allow paste ONLY if it matches internal clipboard
    if (pasted !== internalClipboard) {
        e.preventDefault();
        alert("External paste blocked!");
    }
});


// BLOCK OUTSIDE ACTIONS
document.addEventListener("copy", e => {
    if (document.activeElement !== editor) e.preventDefault();
});

document.addEventListener("paste", e => {
    if (document.activeElement !== editor) e.preventDefault();
});

document.addEventListener("cut", e => {
    if (document.activeElement !== editor) e.preventDefault();
});


// RIGHT CLICK BLOCK
document.addEventListener("contextmenu", e => e.preventDefault());


// KEYBOARD BLOCK
document.addEventListener("keydown", function(e) {
    if (
        (e.ctrlKey && ["c","v","x","u","s"].includes(e.key.toLowerCase())) ||
        e.key === "F12"
    ) {
        if (document.activeElement !== editor) {
            e.preventDefault();
        }
    }
});


// ================= TAB SWITCH DETECTION =================
let warnings = 0;

document.addEventListener("visibilitychange", function() {
    if (document.hidden) {
        warnings++;
        alert("Warning! Tab switching detected!");

        if (warnings >= 3) {
            alert("Too many violations! Submitting...");
            submitExam();
        }
    }
});


// ================= FULLSCREEN ENFORCEMENT =================
function enterFullscreen() {
    document.documentElement.requestFullscreen();
}

enterFullscreen();

document.addEventListener("fullscreenchange", () => {
    if (!document.fullscreenElement) {
        alert("You exited fullscreen!");
    }
});


// ================= SUBMIT =================
function submitExam() {
    const code = editor.value;

    console.log("Submitted Code:\n", code);

    alert("Code Submitted Successfully!");
    window.location.reload();
}

</script>

</body>
</html>
