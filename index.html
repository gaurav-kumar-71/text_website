<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Exam System</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        .container {
            width: 60%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            color: #333;
        }

        .timer {
            font-size: 20px;
            color: red;
            margin-bottom: 20px;
        }

        .question {
            text-align: left;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: gray;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Secure Online Exam</h1>

    <div class="timer" id="timer">Time Left: 60</div>

    <div class="question">
        <p>1. What is JavaScript?</p>
        <input type="radio" name="q1"> Programming Language <br>
        <input type="radio" name="q1"> Database <br>
        <input type="radio" name="q1"> Operating System <br>
    </div>

    <div class="question">
        <p>2. Which is used for styling?</p>
        <input type="radio" name="q2"> HTML <br>
        <input type="radio" name="q2"> CSS <br>
        <input type="radio" name="q2"> C++ <br>
    </div>

    <button onclick="submitExam()">Submit</button>
</div>

<script>

// ================= TIMER =================
let timeLeft = 60;

const timer = setInterval(() => {
    document.getElementById("timer").innerText = "Time Left: " + timeLeft;
    timeLeft--;

    if (timeLeft < 0) {
        clearInterval(timer);
        alert("Time Over! Auto submitting...");
        submitExam();
    }
}, 1000);


// ================= COPY/PASTE BLOCK =================
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("paste", e => e.preventDefault());
document.addEventListener("cut", e => e.preventDefault());


// ================= RIGHT CLICK BLOCK =================
document.addEventListener("contextmenu", e => e.preventDefault());


// ================= KEYBOARD BLOCK =================
document.addEventListener("keydown", function(e) {
    if (
        (e.ctrlKey && ["c","v","x","u","s"].includes(e.key.toLowerCase())) ||
        e.key === "F12"
    ) {
        e.preventDefault();
    }
});


// ================= TAB SWITCH DETECTION =================
let warningCount = 0;

document.addEventListener("visibilitychange", function() {
    if (document.hidden) {
        warningCount++;

        alert("Warning! Do not switch tabs!");

        if (warningCount >= 3) {
            alert("Too many violations! Exam submitted.");
            submitExam();
        }
    }
});


// ================= SUBMIT FUNCTION =================
function submitExam() {
    alert("Exam Submitted Successfully!");
    window.location.reload(); // reset
}

</script>

</body>
</html>
